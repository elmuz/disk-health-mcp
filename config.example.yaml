# Disk Health MCP Configuration
# Copy this file to config.yaml and update with your details

ssh:
  # Server connection details (for host-based diagnostics)
  host: "your-server.example.com"
  port: 22
  username: "your-user"

  # Authentication: choose ONE of the following
  # Option 1: Password authentication (less secure)
  # password: "your-password"

  # Option 2: SSH key authentication (recommended)
  key_path: "~/.ssh/id_ed25519"

security:
  # NEVER allow generic command execution (recommended: false)
  # If set to true, DANGEROUS - only enable if you absolutely must
  allow_generic_commands: false

  # Allowed disk diagnostic commands (whitelist)
  # These are the ONLY commands the MCP can run on the host
  allowed_commands:
    - smartctl
    - nvme
    - lsblk
    - zpool
    - zfs
    - mdadm
    - iostat
    - cat  # only for /proc/mdstat

# Data sources: configure at least one
# host: SSH-based smartctl and system tools
host:
  enabled: true

# prometheus: Query node_exporter disk metrics via Prometheus
prometheus:
  enabled: false
  host: "prometheus.example.com"
  port: 443
  use_https: true
  token: "your-api-token"
  query_timeout: "30s"

# influxdb: Query historical disk metrics from InfluxDB
influxdb:
  enabled: false
  host: "influxdb.example.com"
  port: 443
  use_https: true
  database: "telegraf"  # Default database (Telegraf collects smart/diskio)
  token: "your-api-token"
  query_limit: 1000  # Maximum rows returned per query
